<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeKiwi Cat Player Viz</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    background: #0f0f1a;
    color: #e0e0e0;
    height: 100vh;
    overflow: hidden;
}
.container {
    display: grid;
    grid-template-columns: 1fr 320px;
    grid-template-rows: 48px 1fr;
    height: 100vh;
    gap: 0;
}
header {
    grid-column: 1 / -1;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    padding: 0 20px;
    border-bottom: 1px solid #2a2a4a;
}
header h1 {
    font-size: 16px;
    font-weight: 600;
    color: #7ecfff;
}
header .status {
    margin-left: auto;
    font-size: 12px;
    color: #666;
}
header .status.connected { color: #4ade80; }
#canvas-wrap {
    position: relative;
    background: #2a2a3a;
    overflow: hidden;
}
#map-canvas {
    width: 100%;
    height: 100%;
    display: block;
}
#side-panel {
    background: #12121f;
    border-left: 1px solid #2a2a4a;
    padding: 12px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.card {
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 8px;
    padding: 12px;
}
.card h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    margin-bottom: 8px;
}
.card .value {
    font-size: 14px;
    color: #fff;
}
.state-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
}
.state-INIT, .state-WAIT_FOR_ROBOT, .state-WAIT_FOR_CAT { background: #334155; color: #94a3b8; }
.state-SELECT_PLAY_TARGET { background: #1e3a5f; color: #7dd3fc; }
.state-NAVIGATE_TO_TARGET { background: #1e3a1e; color: #86efac; }
.state-ARM_READY { background: #3b2f1e; color: #fcd34d; }
.state-PLAY { background: #1e4d3a; color: #34d399; }
.state-CAT_TOO_CLOSE { background: #5c1e1e; color: #fca5a5; }
.state-STOP { background: #4a1e1e; color: #f87171; }
.state-ERROR { background: #5c1e1e; color: #ff6b6b; }
.cmd-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
}
.cmd-item {
    text-align: center;
}
.cmd-item .label { font-size: 10px; color: #666; }
.cmd-item .num { font-size: 16px; font-weight: 600; }
.camera-placeholder {
    background: #0a0a14;
    border: 1px dashed #333;
    border-radius: 6px;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #444;
    font-size: 12px;
}
.cat-info { display: flex; justify-content: space-between; }
.legend {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: rgba(15,15,26,0.85);
    border: 1px solid #2a2a4a;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 11px;
    display: flex;
    gap: 12px;
}
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
}
</style>
</head>
<body>
<div class="container">
    <header>
        <h1>LeKiwi Cat Player</h1>
        <span class="status" id="conn-status">Disconnected</span>
    </header>
    <div id="canvas-wrap">
        <canvas id="map-canvas"></canvas>
        <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>Robot</div>
            <div class="legend-item"><div class="legend-dot" style="background:#f97316"></div>Cat</div>
            <div class="legend-item"><div class="legend-dot" style="background:#facc15"></div>Target</div>
            <div class="legend-item"><div class="legend-dot" style="background:#e63946"></div>Path</div>
        </div>
    </div>
    <div id="side-panel">
        <div class="card">
            <h3>Camera Feed</h3>
            <div class="camera-placeholder">No camera connected</div>
        </div>
        <div class="card">
            <h3>Robot State</h3>
            <div class="value"><span class="state-badge" id="state-val">INIT</span></div>
        </div>
        <div class="card">
            <h3>Robot Pose</h3>
            <div class="cmd-grid">
                <div class="cmd-item"><div class="label">X</div><div class="num" id="pose-x">0.00</div></div>
                <div class="cmd-item"><div class="label">Y</div><div class="num" id="pose-y">0.00</div></div>
                <div class="cmd-item"><div class="label">Yaw</div><div class="num" id="pose-yaw">0.00</div></div>
            </div>
        </div>
        <div class="card">
            <h3>Control Command</h3>
            <div class="cmd-grid">
                <div class="cmd-item"><div class="label">vx</div><div class="num" id="cmd-vx">0.00</div></div>
                <div class="cmd-item"><div class="label">vy</div><div class="num" id="cmd-vy">0.00</div></div>
                <div class="cmd-item"><div class="label">wz</div><div class="num" id="cmd-wz">0.00</div></div>
            </div>
            <div style="margin-top:8px;font-size:12px;">
                Safety: <span id="safety-val" style="color:#4ade80">OK</span>
            </div>
        </div>
        <div class="card">
            <h3>Arm</h3>
            <div class="value" id="arm-val">HOME_POSE</div>
        </div>
        <div class="card">
            <h3>Cat</h3>
            <div class="cat-info">
                <span>Visible: <span id="cat-vis">--</span></span>
                <span>Dist: <span id="cat-dist">--</span>m</span>
            </div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('map-canvas');
const ctx = canvas.getContext('2d');
const connStatus = document.getElementById('conn-status');

let gridCache = null;
let gridImage = null;
let robotPose = null;
let catBbox = null;
let playTarget = null;
let basePath = null;
let armTarget = null;
let robotCommand = null;
let worldState = null;

// Resize canvas to match container
function resizeCanvas() {
    const wrap = document.getElementById('canvas-wrap');
    canvas.width = wrap.clientWidth * window.devicePixelRatio;
    canvas.height = wrap.clientHeight * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    if (gridCache) buildGridImage();
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function worldToCanvas(wx, wy) {
    if (!gridCache) return [0, 0];
    const wrap = document.getElementById('canvas-wrap');
    const cw = wrap.clientWidth;
    const ch = wrap.clientHeight;
    const mapPx = gridCache.width;
    const mapPy = gridCache.height;
    const scale = Math.min(cw / mapPx, ch / mapPy);
    const offsetX = (cw - mapPx * scale) / 2;
    const offsetY = (ch - mapPy * scale) / 2;

    const col = (wx - gridCache.origin[0]) / gridCache.resolution;
    const row = (wy - gridCache.origin[1]) / gridCache.resolution;
    const px = offsetX + col * scale;
    const py = offsetY + (gridCache.height - row) * scale;
    return [px, py];
}

function buildGridImage() {
    if (!gridCache) return;
    const g = gridCache;
    const cellSize = 4;
    const offscreen = document.createElement('canvas');
    offscreen.width = g.width * cellSize;
    offscreen.height = g.height * cellSize;
    const octx = offscreen.getContext('2d');

    // White background
    octx.fillStyle = '#ffffff';
    octx.fillRect(0, 0, offscreen.width, offscreen.height);

    // Draw occupied cells as black
    octx.fillStyle = '#1a1a1a';
    for (let r = 0; r < g.height; r++) {
        for (let c = 0; c < g.width; c++) {
            const idx = r * g.width + c;
            if (g.data[idx] === 1) {
                const px = c * cellSize;
                const py = (g.height - 1 - r) * cellSize;
                octx.fillRect(px, py, cellSize, cellSize);
            }
        }
    }

    // Draw grid lines (light gray)
    octx.strokeStyle = 'rgba(180, 180, 180, 0.3)';
    octx.lineWidth = 0.5;
    for (let i = 0; i <= g.width; i += 10) {
        octx.beginPath();
        octx.moveTo(i * cellSize, 0);
        octx.lineTo(i * cellSize, offscreen.height);
        octx.stroke();
    }
    for (let i = 0; i <= g.height; i += 10) {
        octx.beginPath();
        octx.moveTo(0, i * cellSize);
        octx.lineTo(offscreen.width, i * cellSize);
        octx.stroke();
    }

    gridImage = offscreen;
}

function render() {
    const wrap = document.getElementById('canvas-wrap');
    const cw = wrap.clientWidth;
    const ch = wrap.clientHeight;
    ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
    ctx.clearRect(0, 0, cw, ch);

    // Draw grid
    if (gridImage && gridCache) {
        const mapPx = gridCache.width;
        const mapPy = gridCache.height;
        const scale = Math.min(cw / mapPx, ch / mapPy);
        const offsetX = (cw - mapPx * scale) / 2;
        const offsetY = (ch - mapPy * scale) / 2;
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(gridImage, offsetX, offsetY, mapPx * scale, mapPy * scale);
    }

    // Draw path (from robot to remaining waypoints)
    if (basePath && basePath.path && basePath.path.length > 0 && robotPose) {
        const wpIdx = (robotCommand && robotCommand.waypoint_idx) || 0;
        ctx.strokeStyle = '#e63946';
        ctx.lineWidth = 3;
        ctx.setLineDash([]);
        ctx.beginPath();
        // Start line from robot's current position
        const [rx, ry] = worldToCanvas(robotPose.x, robotPose.y);
        ctx.moveTo(rx, ry);
        // Draw to remaining waypoints
        for (let i = wpIdx; i < basePath.path.length; i++) {
            const [px, py] = worldToCanvas(basePath.path[i][0], basePath.path[i][1]);
            ctx.lineTo(px, py);
        }
        ctx.stroke();
    }

    // Draw play target
    if (playTarget && playTarget.target_pose) {
        const [tx, ty] = worldToCanvas(playTarget.target_pose.x, playTarget.target_pose.y);
        ctx.beginPath();
        ctx.arc(tx, ty, 8, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(250, 204, 21, 0.3)';
        ctx.fill();
        ctx.strokeStyle = '#facc15';
        ctx.lineWidth = 2;
        ctx.stroke();
        // Cross
        ctx.beginPath();
        ctx.moveTo(tx - 5, ty); ctx.lineTo(tx + 5, ty);
        ctx.moveTo(tx, ty - 5); ctx.lineTo(tx, ty + 5);
        ctx.stroke();
    }

    // Draw cat
    if (catBbox && catBbox.center) {
        const [cx, cy] = worldToCanvas(catBbox.center[0], catBbox.center[1]);
        ctx.beginPath();
        ctx.arc(cx, cy, 12, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(249, 115, 22, 0.25)';
        ctx.fill();
        ctx.strokeStyle = '#f97316';
        ctx.lineWidth = 2.5;
        ctx.stroke();
        // Cat icon (simple ears)
        ctx.beginPath();
        ctx.moveTo(cx - 6, cy - 8);
        ctx.lineTo(cx - 3, cy - 14);
        ctx.lineTo(cx, cy - 8);
        ctx.moveTo(cx, cy - 8);
        ctx.lineTo(cx + 3, cy - 14);
        ctx.lineTo(cx + 6, cy - 8);
        ctx.strokeStyle = '#f97316';
        ctx.lineWidth = 1.5;
        ctx.stroke();
    }

    // Draw robot
    if (robotPose) {
        const [rx, ry] = worldToCanvas(robotPose.x, robotPose.y);
        const yaw = -(robotPose.yaw || 0);
        // Body circle
        ctx.beginPath();
        ctx.arc(rx, ry, 10, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(59, 130, 246, 0.3)';
        ctx.fill();
        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 2.5;
        ctx.stroke();
        // Direction arrow
        const arrowLen = 18;
        const ax = rx + arrowLen * Math.cos(yaw);
        const ay = ry + arrowLen * Math.sin(yaw);
        ctx.beginPath();
        ctx.moveTo(rx, ry);
        ctx.lineTo(ax, ay);
        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 2.5;
        ctx.stroke();
        // Arrowhead
        const headLen = 6;
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(ax - headLen * Math.cos(yaw - 0.4), ay - headLen * Math.sin(yaw - 0.4));
        ctx.moveTo(ax, ay);
        ctx.lineTo(ax - headLen * Math.cos(yaw + 0.4), ay - headLen * Math.sin(yaw + 0.4));
        ctx.stroke();
    }

    requestAnimationFrame(render);
}
requestAnimationFrame(render);

// Update side panel
function updatePanel() {
    if (worldState && worldState.state) {
        const el = document.getElementById('state-val');
        el.textContent = worldState.state;
        el.className = 'state-badge state-' + worldState.state;
    }
    if (robotPose) {
        document.getElementById('pose-x').textContent = robotPose.x.toFixed(3);
        document.getElementById('pose-y').textContent = robotPose.y.toFixed(3);
        document.getElementById('pose-yaw').textContent = (robotPose.yaw || 0).toFixed(3);
    }
    if (robotCommand) {
        const bc = robotCommand.base_cmd || {};
        document.getElementById('cmd-vx').textContent = (bc.vx || 0).toFixed(3);
        document.getElementById('cmd-vy').textContent = (bc.vy || 0).toFixed(3);
        document.getElementById('cmd-wz').textContent = (bc.wz || 0).toFixed(3);
        const safeEl = document.getElementById('safety-val');
        if (robotCommand.safety_stop) {
            safeEl.textContent = 'STOP';
            safeEl.style.color = '#f87171';
        } else {
            safeEl.textContent = 'OK';
            safeEl.style.color = '#4ade80';
        }
    }
    if (armTarget) {
        document.getElementById('arm-val').textContent = armTarget.pose_name || '--';
    }
    if (catBbox) {
        document.getElementById('cat-vis').textContent = catBbox.visible ? 'Yes' : 'No';
        if (robotPose && catBbox.center) {
            const dx = catBbox.center[0] - robotPose.x;
            const dy = catBbox.center[1] - robotPose.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            document.getElementById('cat-dist').textContent = dist.toFixed(2);
        }
    }
}

// WebSocket connection
function connect() {
    const ws = new WebSocket('ws://' + window.location.host + '/ws');

    ws.onopen = () => {
        connStatus.textContent = 'Connected';
        connStatus.className = 'status connected';
    };

    ws.onclose = () => {
        connStatus.textContent = 'Disconnected';
        connStatus.className = 'status';
        setTimeout(connect, 1000);
    };

    ws.onerror = () => ws.close();

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (data.robot_pose) robotPose = data.robot_pose;
        if (data.cat_bbox_3d) catBbox = data.cat_bbox_3d;
        if (data.world_state) worldState = data.world_state;
        if (data.play_target) playTarget = data.play_target;
        if (data.base_path) basePath = data.base_path;
        if (data.arm_target) armTarget = data.arm_target;
        if (data.robot_command) robotCommand = data.robot_command;

        if (data.occupancy_grid) {
            gridCache = data.occupancy_grid;
            buildGridImage();
        }

        updatePanel();
    };
}
connect();
</script>
</body>
</html>
